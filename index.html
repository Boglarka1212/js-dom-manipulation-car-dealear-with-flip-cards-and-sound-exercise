<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Scroll Animation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="sec1 show-animate">
        <h1 class="animate">Velkommen til VIA Biler</h1>
        <p class="animate">Danmarks største udvalg af biler</p>
    </section>
    <section class="sec2">
        <h2 class="animate">De fedeste biler</h2>
        <p class="animate">Vi er med dig hele vejen - og PÅ vejen</p>
    </section>

    <section class="sec5">
        <div class="images">
            <figure class="card" id="car1">
                <img src="img/car1.jpg" alt="Yellow Car">
                <figcaption>
                    <p class="car-description">Brand: Lamborghini</p>
                    <p class="car-description">Model: Huracán</p>
                    <p class="car-description">TopSpeed: 325</p>
                </figcaption>
            </figure>

            <figure class="card" id="car2">
                <img src="img/car2.jpg" alt="Red Car">
                <figcaption>
                    <p class="car-description">Brand: Porsche</p>
                    <p class="car-description">Model: 911 (964/993)</p>
                    <p class="car-description">TopSpeed: 280</p>
                </figcaption>
            </figure>

            <figure class="card" id="car3">
                <img src="img/car3.jpg" alt="Grey Car">
                <figcaption>
                    <p class="car-description">Brand: Mercedes-AMG</p>
                    <p class="car-description">Model: GT R</p>
                    <p class="car-description">TopSpeed: 318</p>
                </figcaption>
            </figure>
        </div>
    </section>

<script src="js/script.js"></script>
</body>
</html>
